<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniMart POS - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gradient-to-r from-blue-500 to-purple-600">
<div class="min-h-screen flex items-center justify-center"
     x-data="loginComponent()"
     x-init="init()">
    <div class="bg-white rounded-lg shadow-xl p-8 w-96">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">MiniMart POS</h1>
            <p class="text-gray-600 mt-2">Point of Sale System</p>
        </div>

        <div x-show="error" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4"
             x-text="errorMessage"></div>

        <div class="space-y-4">
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Username</label>
                <input type="text"
                       x-model="username"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
                       placeholder="Enter username">
            </div>

            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
                <input type="password"
                       x-model="password"
                       @keyup.enter="login()"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
                       placeholder="Enter password">
            </div>

            <button @click="login()"
                    class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700 transition">
                Login
            </button>
        </div>

        <div class="mt-6 text-center text-sm text-gray-600">
            <p>Demo Credentials:</p>
            <p>Username: admin | Password: admin123</p>
            <p>Username: cashier | Password: cashier123</p>
        </div>
    </div>
</div>

<script>
    function loginComponent() {
        return {
            username: '',
            password: '',
            error: false,
            errorMessage: '',

            init() {
                // If already logged in, redirect to dashboard
                const token = sessionStorage.getItem('authToken');
                if (token) {
                    window.location.href = 'dashboard.html';
                }
            },

            async login() {
                try {
                    const response = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            username: this.username,
                            password: this.password
                        })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        sessionStorage.setItem('authToken', data.token);
                        sessionStorage.setItem('user', JSON.stringify(data.user));
                        window.location.href = 'dashboard.html';
                    } else {
                        this.error = true;
                        this.errorMessage = 'Invalid username or password';
                        setTimeout(() => { this.error = false; }, 3000);
                    }
                } catch (error) {
                    this.error = true;
                    this.errorMessage = 'Login failed. Please try again.';
                    setTimeout(() => { this.error = false; }, 3000);
                }
            }
        };
    }
</script>
</body>
</html>
