<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniMart POS - Reports</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100">
<div x-data="reportComponent()" x-init="init()">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-2">
                    <i class="fas fa-chart-line text-2xl text-blue-600"></i>
                    <h1 class="text-xl font-bold text-gray-800">Sales Reports</h1>
                </div>
                <div class="flex space-x-4">
                    <a href="dashboard.html" class="text-gray-700 hover:bg-gray-200 px-3 py-2 rounded-lg">Dashboard</a>
                    <a href="pos.html" class="text-gray-700 hover:bg-gray-200 px-3 py-2 rounded-lg">POS</a>
                    <a href="products.html" class="text-gray-700 hover:bg-gray-200 px-3 py-2 rounded-lg">Products</a>
                    <a href="invoices.html" class="text-gray-700 hover:bg-gray-200 px-3 py-2 rounded-lg">Invoices</a>
                    <button @click="logout()" class="text-red-600 hover:bg-red-50 px-3 py-2 rounded-lg">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">Sales Analytics</h2>

        <!-- Revenue Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-gradient-to-r from-blue-500 to-blue-600 rounded-lg shadow-md p-6 text-white">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-sm opacity-90">Today's Revenue</p>
                        <p class="text-3xl font-bold">$<span x-text="reportData.todayRevenue"></span></p>
                    </div>
                    <i class="fas fa-calendar-day text-4xl opacity-50"></i>
                </div>
            </div>

            <div class="bg-gradient-to-r from-green-500 to-green-600 rounded-lg shadow-md p-6 text-white">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-sm opacity-90">Last Week Revenue</p>
                        <p class="text-3xl font-bold">$<span x-text="reportData.lastWeekRevenue"></span></p>
                    </div>
                    <i class="fas fa-calendar-week text-4xl opacity-50"></i>
                </div>
            </div>

            <div class="bg-gradient-to-r from-purple-500 to-purple-600 rounded-lg shadow-md p-6 text-white">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-sm opacity-90">Last Month Revenue</p>
                        <p class="text-3xl font-bold">$<span x-text="reportData.lastMonthRevenue"></span></p>
                    </div>
                    <i class="fas fa-calendar-alt text-4xl opacity-50"></i>
                </div>
            </div>
        </div>

        <!-- Inventory Stats and Chart -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white rounded-lg shadow-md p-6">
                <h3 class="text-lg font-semibold mb-4">Inventory Overview</h3>
                <div class="space-y-4">
                    <div class="flex justify-between items-center p-3 bg-gray-50 rounded">
                        <span>Total Products</span>
                        <span class="font-bold text-blue-600" x-text="reportData.totalProducts"></span>
                    </div>
                    <div class="flex justify-between items-center p-3 bg-gray-50 rounded">
                        <span>Low Stock Items</span>
                        <span class="font-bold text-yellow-600" x-text="reportData.lowStockItems"></span>
                    </div>
                    <div class="flex justify-between items-center p-3 bg-gray-50 rounded">
                        <span>Total Sales (All Time)</span>
                        <span class="font-bold text-green-600">$<span x-text="reportData.totalSales"></span></span>
                    </div>
                </div>
            </div>

            <!-- Chart Container -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <h3 class="text-lg font-semibold mb-4">Revenue Trend</h3>
                <canvas id="revenueChart" width="400" height="300"></canvas>
            </div>
        </div>

        <!-- Low Stock Details -->
        <div class="mt-8 bg-white rounded-lg shadow-md p-6" x-show="lowStockProducts.length > 0">
            <h3 class="text-lg font-semibold mb-4 text-yellow-600">
                <i class="fas fa-exclamation-triangle"></i> Low Stock Products
            </h3>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50">
                    <tr>
                        <th class="px-4 py-2 text-left">Product Name</th>
                        <th class="px-4 py-2 text-right">Current Stock</th>
                        <th class="px-4 py-2 text-right">Threshold</th>
                    </tr>
                    </thead>
                    <tbody>
                    <template x-for="product in lowStockProducts">
                        <tr class="border-b">
                            <td class="px-4 py-2" x-text="product.name"></td>
                            <td class="px-4 py-2 text-right text-red-600 font-bold" x-text="product.quantity"></td>
                            <td class="px-4 py-2 text-right" x-text="product.lowStockThreshold"></td>
                        </tr>
                    </template>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    function reportComponent() {
        return {
            reportData: {
                totalProducts: 0,
                totalSales: 0,
                lowStockItems: 0,
                todayRevenue: 0,
                lastWeekRevenue: 0,
                lastMonthRevenue: 0
            },
            lowStockProducts: [],
            chart: null,

            init() {
                this.checkAuth();
                this.loadReport();
                this.loadLowStockProducts();
            },

            checkAuth() {
                const token = sessionStorage.getItem('authToken');
                if (!token) {
                    window.location.href = 'index.html';
                }
            },

            async loadReport() {
                try {
                    const response = await fetch('/api/reports/dashboard', {
                        headers: { 'Authorization': `Bearer ${sessionStorage.getItem('authToken')}` }
                    });
                    if (response.ok) {
                        this.reportData = await response.json();
                        this.updateChart();
                    } else {
                        console.error('Failed to load report:', response.status);
                    }
                } catch (error) {
                    console.error('Error loading report:', error);
                }
            },

            async loadLowStockProducts() {
                try {
                    const response = await fetch('/api/products/low-stock', {
                        headers: { 'Authorization': `Bearer ${sessionStorage.getItem('authToken')}` }
                    });
                    if (response.ok) {
                        this.lowStockProducts = await response.json();
                    } else {
                        console.error('Failed to load low stock products:', response.status);
                    }
                } catch (error) {
                    console.error('Error loading low stock products:', error);
                }
            },

            updateChart() {
                const ctx = document.getElementById('revenueChart').getContext('2d');
                if (this.chart) {
                    this.chart.destroy();
                }
                this.chart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['Today', 'Last Week', 'Last Month'],
                        datasets: [{
                            label: 'Revenue ($)',
                            data: [
                                this.reportData.todayRevenue,
                                this.reportData.lastWeekRevenue,
                                this.reportData.lastMonthRevenue
                            ],
                            backgroundColor: [
                                'rgba(59, 130, 246, 0.8)',
                                'rgba(34, 197, 94, 0.8)',
                                'rgba(168, 85, 247, 0.8)'
                            ],
                            borderColor: [
                                'rgb(59, 130, 246)',
                                'rgb(34, 197, 94)',
                                'rgb(168, 85, 247)'
                            ],
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: {
                            legend: { position: 'top' },
                            title: { display: true, text: 'Revenue Comparison' }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    callback: function(value) { return '$' + value; }
                                }
                            }
                        }
                    }
                });
            },

            logout() {
                sessionStorage.removeItem('authToken');
                sessionStorage.removeItem('user');
                window.location.href = 'index.html';
            }
        };
    }
</script>
</body>
</html>
