<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniMart POS - Products Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100">
<div x-data="productsComponent()" x-init="init()">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-2">
                    <i class="fas fa-boxes text-2xl text-blue-600"></i>
                    <h1 class="text-xl font-bold text-gray-800">Product Management</h1>
                </div>
                <div class="flex space-x-4">
                    <a href="dashboard.html" class="text-gray-700 hover:bg-gray-200 px-3 py-2 rounded-lg">Dashboard</a>
                    <a href="pos.html" class="text-gray-700 hover:bg-gray-200 px-3 py-2 rounded-lg">POS</a>
                    <a href="invoices.html" class="text-gray-700 hover:bg-gray-200 px-3 py-2 rounded-lg">Invoices</a>
                    <a href="report.html" class="text-gray-700 hover:bg-gray-200 px-3 py-2 rounded-lg">Report</a>
                    <button @click="logout()" class="text-red-600 hover:bg-red-50 px-3 py-2 rounded-lg">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <!-- Add Product Button -->
        <div class="mb-6 flex justify-between items-center">
            <h2 class="text-2xl font-bold text-gray-800">Products Inventory</h2>
            <button @click="openModal()" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition">
                <i class="fas fa-plus"></i> Add Product
            </button>
        </div>

        <!-- Products Table -->
        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-800 text-white">
                    <tr>
                        <th class="px-6 py-3 text-left">ID</th>
                        <th class="px-6 py-3 text-left">Barcode</th>
                        <th class="px-6 py-3 text-left">Name</th>
                        <th class="px-6 py-3 text-right">Price</th>
                        <th class="px-6 py-3 text-center">Quantity</th>
                        <th class="px-6 py-3 text-center">Status</th>
                        <th class="px-6 py-3 text-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <template x-for="product in products" :key="product.id">
                        <tr class="border-b hover:bg-gray-50">
                            <td class="px-6 py-4" x-text="product.id"></td>
                            <td class="px-6 py-4" x-text="product.barcode"></td>
                            <td class="px-6 py-4 font-semibold" x-text="product.name"></td>
                            <td class="px-6 py-4 text-right text-green-600 font-semibold">$<span x-text="product.price"></span></td>
                            <td class="px-6 py-4 text-center">
                                <span :class="product.quantity <= 5 ? 'text-red-600 font-bold' : ''" x-text="product.quantity"></span>
                            </td>
                            <td class="px-6 py-4 text-center">
                                <span x-show="product.quantity <= 5" class="bg-red-100 text-red-800 px-2 py-1 rounded text-sm">Low Stock</span>
                                <span x-show="product.quantity > 5" class="bg-green-100 text-green-800 px-2 py-1 rounded text-sm">In Stock</span>
                            </td>
                            <td class="px-6 py-4 text-center">
                                <button @click="editProduct(product)" class="text-blue-600 hover:text-blue-800 mr-3">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button @click="deleteProduct(product.id)" class="text-red-600 hover:text-red-800">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    </template>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Product Modal -->
    <!-- Product Modal -->
    <div x-show="showModal" x-transition class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" style="display: none;">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md max-h-[85vh] flex flex-col">
            <div class="flex justify-between items-center p-6 border-b">
                <h3 class="text-xl font-bold" x-text="modalTitle"></h3>
                <button @click="closeModal()" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="p-6 overflow-y-auto flex-1">
                <div class="space-y-4">
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2">Barcode *</label>
                        <input type="text" x-model="formData.barcode" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2">Product Name *</label>
                        <input type="text" x-model="formData.name" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2">Description</label>
                        <textarea x-model="formData.description" rows="3" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-blue-500"></textarea>
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2">Price *</label>
                        <input type="number" step="0.01" x-model="formData.price" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2">Quantity *</label>
                        <input type="number" x-model="formData.quantity" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2">Low Stock Threshold</label>
                        <input type="number" x-model="formData.lowStockThreshold" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-blue-500">
                    </div>
                </div>
            </div>
            <div class="flex justify-end space-x-3 p-6 border-t">
                <button @click="closeModal()" class="px-4 py-2 bg-gray-300 rounded-lg hover:bg-gray-400 transition">Cancel</button>
                <button @click="saveProduct()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                    Save
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    function productsComponent() {
        return {
            products: [],
            showModal: false,
            modalTitle: 'Add Product',
            editingId: null,
            formData: {
                barcode: '',
                name: '',
                description: '',
                price: '',
                quantity: '',
                lowStockThreshold: 5
            },

            init() {
                this.checkAuth();
                this.loadProducts();
            },

            checkAuth() {
                const token = sessionStorage.getItem('authToken');
                if (!token) {
                    window.location.href = 'index.html';
                }
            },

            async loadProducts() {
                try {
                    const response = await fetch('/api/products', {
                        headers: { 'Authorization': `Bearer ${sessionStorage.getItem('authToken')}` }
                    });
                    if (response.ok) {
                        this.products = await response.json();
                        console.log('Products loaded:', this.products);
                    } else {
                        console.error('Failed to load products:', response.status);
                    }
                } catch (error) {
                    console.error('Error loading products:', error);
                }
            },

            openModal() {
                this.modalTitle = 'Add Product';
                this.editingId = null;
                this.formData = {
                    barcode: '',
                    name: '',
                    description: '',
                    price: '',
                    quantity: '',
                    lowStockThreshold: 5
                };
                this.showModal = true;
                // Lock background scroll
                document.body.classList.add('overflow-hidden');
            },

            editProduct(product) {
                this.modalTitle = 'Edit Product';
                this.editingId = product.id;
                this.formData = {
                    barcode: product.barcode,
                    name: product.name,
                    description: product.description || '',
                    price: product.price,
                    quantity: product.quantity,
                    lowStockThreshold: product.lowStockThreshold
                };
                this.showModal = true;
                // Lock background scroll
                document.body.classList.add('overflow-hidden');
            },

            async saveProduct() {
                // Validate required fields
                if (!this.formData.barcode || !this.formData.name || !this.formData.price || this.formData.quantity === '') {
                    alert('Please fill in all required fields (Barcode, Name, Price, Quantity)');
                    return;
                }

                try {
                    const url = this.editingId ? `/api/products/${this.editingId}` : '/api/products';
                    const method = this.editingId ? 'PUT' : 'POST';

                    const response = await fetch(url, {
                        method: method,
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${sessionStorage.getItem('authToken')}`
                        },
                        body: JSON.stringify(this.formData)
                    });

                    if (response.ok) {
                        this.closeModal();
                        await this.loadProducts(); // Refresh list
                        alert(this.editingId ? 'Product updated successfully!' : 'Product added successfully!');
                    } else {
                        const error = await response.text();
                        console.error('Save product error:', error);
                        alert('Failed to save product: ' + error);
                    }
                } catch (error) {
                    console.error('Error saving product:', error);
                    alert('Failed to save product. Check network or server logs.');
                }
            },

            async deleteProduct(id) {
                if (confirm('Are you sure you want to delete this product?')) {
                    try {
                        const response = await fetch(`/api/products/${id}`, {
                            method: 'DELETE',
                            headers: { 'Authorization': `Bearer ${sessionStorage.getItem('authToken')}` }
                        });

                        if (response.ok) {
                            await this.loadProducts();
                            alert('Product deleted successfully!');
                        } else {
                            alert('Failed to delete product');
                        }
                    } catch (error) {
                        console.error('Error deleting product:', error);
                        alert('Failed to delete product');
                    }
                }
            },

            closeModal() {
                this.showModal = false;
                // Unlock background scroll
                document.body.classList.remove('overflow-hidden');
            },

            logout() {
                sessionStorage.removeItem('authToken');
                sessionStorage.removeItem('user');
                window.location.href = 'index.html';
            }
        };
    }
</script>
</body>
</html>
