<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniMart POS - Invoice History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100">
<div x-data="invoicesComponent()" x-init="init()">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-2">
                    <i class="fas fa-file-invoice text-2xl text-blue-600"></i>
                    <h1 class="text-xl font-bold text-gray-800">Invoice History</h1>
                </div>
                <div class="flex space-x-4">
                    <a href="dashboard.html" class="text-gray-700 hover:bg-gray-200 px-3 py-2 rounded-lg">Dashboard</a>
                    <a href="pos.html" class="text-gray-700 hover:bg-gray-200 px-3 py-2 rounded-lg">POS</a>
                    <a href="products.html" class="text-gray-700 hover:bg-gray-200 px-3 py-2 rounded-lg">Products</a>
                    <a href="report.html" class="text-gray-700 hover:bg-gray-200 px-3 py-2 rounded-lg">Report</a>
                    <button @click="logout()" class="text-red-600 hover:bg-red-50 px-3 py-2 rounded-lg">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">All Invoices</h2>

        <!-- Invoices Table -->
        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-800 text-white">
                    <tr>
                        <th class="px-6 py-3 text-left">Invoice #</th>
                        <th class="px-6 py-3 text-left">Customer Name</th>
                        <th class="px-6 py-3 text-right">Total Amount</th>
                        <th class="px-6 py-3 text-center">Date</th>
                        <th class="px-6 py-3 text-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <template x-for="invoice in invoices" :key="invoice.id">
                        <tr class="border-b hover:bg-gray-50 cursor-pointer" @click="viewInvoice(invoice.id)">
                            <td class="px-6 py-4 font-semibold text-blue-600" x-text="invoice.invoiceNumber"></td>
                            <td class="px-6 py-4" x-text="invoice.customerName"></td>
                            <td class="px-6 py-4 text-right text-green-600 font-bold">$<span x-text="invoice.totalAmount"></span></td>
                            <td class="px-6 py-4 text-center" x-text="new Date(invoice.createdAt).toLocaleDateString()"></td>
                            <td class="px-6 py-4 text-center">
                                <button @click.stop="viewInvoice(invoice.id)" class="bg-blue-600 text-white px-3 py-1 rounded hover:bg-blue-700">
                                    <i class="fas fa-eye"></i> View
                                </button>
                            </td>
                        </tr>
                    </template>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Invoice Details Modal -->
    <div x-show="showDetails" x-transition class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" style="display: none;">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-2xl mx-4">
            <div class="flex justify-between items-center p-6 border-b">
                <h3 class="text-xl font-bold">Invoice Details</h3>
                <button @click="closeDetails()" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="p-6">
                <div class="mb-4">
                    <p><strong>Invoice Number:</strong> <span x-text="selectedInvoice.invoiceNumber"></span></p>
                    <p><strong>Customer:</strong> <span x-text="selectedInvoice.customerName"></span></p>
                    <p><strong>Date:</strong> <span x-text="new Date(selectedInvoice.createdAt).toLocaleString()"></span></p>
                </div>

                <table class="w-full mb-4">
                    <thead class="bg-gray-50">
                    <tr>
                        <th class="px-4 py-2 text-left">Product</th>
                        <th class="px-4 py-2 text-center">Quantity</th>
                        <th class="px-4 py-2 text-right">Unit Price</th>
                        <th class="px-4 py-2 text-right">Subtotal</th>
                    </tr>
                    </thead>
                    <tbody>
                    <template x-for="item in selectedInvoice.items">
                        <tr class="border-b">
                            <td class="px-4 py-2" x-text="item.productName"></td>
                            <td class="px-4 py-2 text-center" x-text="item.quantity"></td>
                            <td class="px-4 py-2 text-right">$<span x-text="item.unitPrice"></span></td>
                            <td class="px-4 py-2 text-right">$<span x-text="item.subtotal"></span></td>
                        </tr>
                    </template>
                    </tbody>
                    <tfoot>
                    <tr class="border-t font-bold">
                        <td colspan="3" class="px-4 py-2 text-right">Total:</td>
                        <td class="px-4 py-2 text-right text-green-600">$<span x-text="selectedInvoice.totalAmount"></span></td>
                    </tr>
                    </tfoot>
                </table>
            </div>
            <div class="flex justify-end p-6 border-t">
                <button @click="closeDetails()" class="px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600">Close</button>
            </div>
        </div>
    </div>
</div>

<script>
    function invoicesComponent() {
        return {
            invoices: [],
            showDetails: false,
            selectedInvoice: {},

            init() {
                this.checkAuth();
                this.loadInvoices();
            },

            checkAuth() {
                if (!localStorage.getItem('authToken')) {
                    window.location.href = '/';
                }
            },

            async loadInvoices() {
                try {
                    const response = await fetch('/api/invoices', {
                        headers: { 'Authorization': `Bearer ${localStorage.getItem('authToken')}` }
                    });
                    if (response.ok) {
                        this.invoices = await response.json();
                    }
                } catch (error) {
                    console.error('Error loading invoices:', error);
                }
            },

            async viewInvoice(id) {
                try {
                    const response = await fetch(`/api/invoices/${id}`, {
                        headers: { 'Authorization': `Bearer ${localStorage.getItem('authToken')}` }
                    });
                    if (response.ok) {
                        this.selectedInvoice = await response.json();
                        this.showDetails = true;
                    }
                } catch (error) {
                    console.error('Error loading invoice details:', error);
                }
            },

            closeDetails() {
                this.showDetails = false;
                this.selectedInvoice = {};
            },

            logout() {
                localStorage.removeItem('authToken');
                localStorage.removeItem('user');
                window.location.href = '/';
            }
        }
    }
</script>
</body>
</html>
